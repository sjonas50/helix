---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-beat
  labels:
    app: helix
    component: beat
spec:
  replicas: 1  # Must be exactly 1
  selector:
    matchLabels:
      app: helix
      component: beat
  template:
    metadata:
      labels:
        app: helix
        component: beat
    spec:
      containers:
        - name: beat
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["uv", "run", "celery", "-A", "helix.workers.celery_app", "beat", "-l", "info"]
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
