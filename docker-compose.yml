services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Celery worker — high-priority workflow queue
  worker-workflow:
    build: .
    command: uv run celery -A helix.workers.celery_app worker -Q workflow -l info -c 4
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery worker — low-priority dream cycle queue (separate pool per arch decision #10)
  worker-dream:
    build: .
    command: uv run celery -A helix.workers.celery_app worker -Q dream -l info -c 2
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery beat — scheduler for dream cycle triggers (every 15 min)
  beat:
    build: .
    command: uv run celery -A helix.workers.celery_app beat -l info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: helix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api/proxy
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/ws
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
